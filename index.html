    // =========================================================================
    // SECTION 6: EVENT BINDINGS
    // =========================================================================
    function bindEvents() {
      document.querySelectorAll('[data-act]').forEach(el => {
        const act = el.dataset.act;
        switch (act) {
          case 'toggle-nav':
            el.onclick = () => {
              state.ui.navExpanded = !state.ui.navExpanded;
              saveUi();
              render();
            };
            break;
          case 'tab':
            el.onclick = () => {
              state.ui.activeTab = el.dataset.tab;
              saveUi();
              render();
            };
            break;
          case 'add':
            el.onclick = () => {
              ui.isAdding = true;
              ui.editingId = null;
              render();
            };
            break;
          case 'edit':
            el.onclick = (e) => {
              e.stopPropagation();
              ui.editingId = el.dataset.id;
              ui.isAdding = false;
              render();
            };
            break;
          case 'delete':
            el.onclick = (e) => {
              e.stopPropagation();
              if (confirm('Delete this assignment?')) {
                setTimeout(() => deleteAssignment(el.dataset.id), 0);
              }
            };
            break;
          case 'modal-close':
            el.onclick = () => {
              ui.isAdding = false;
              ui.editingId = null;
              render();
            };
            break;
          case 'modal-bg':
            el.onclick = (e) => {
              if (e.target === el) {
                ui.isAdding = false;
                ui.editingId = null;
                render();
              }
            };
            break;
          case 'form-submit':
            el.onsubmit = (e) => {
              e.preventDefault();
              const f = new FormData(el);
              const data = Object.fromEntries(f.entries());
              if (ui.editingId) data.id = ui.editingId;
              ui.isAdding = false;
              ui.editingId = null;
              render(); // close modal immediately
              setTimeout(() => upsertAssignment(data), 0);
            };
            break;
          case 'search':
            el.oninput = () => {
              ui.search = el.value;
              updateDashCards();
            };
            break;
          case 'filter-course':
            el.onchange = () => {
              ui.filterCourse = el.value;
              render();
            };
            break;
          case 'filter-status':
            el.onchange = () => {
              ui.filterStatus = el.value;
              render();
            };
            break;
          case 'toggle-hide':
            el.onclick = () => {
              state.ui.hideCompleted = !state.ui.hideCompleted;
              saveUi();
              render();
            };
            break;
          case 'toggle-monday':
            el.onclick = () => {
              state.ui.mondayStart = !state.ui.mondayStart;
              saveUi();
              render();
            };
            break;
          case 'select-day':
            el.onclick = () => {
              ui.selectedDate = new Date(el.dataset.date);
              render();
            };
            break;
          case 'mini-prev':
            el.onclick = () => {
              const d = ui.selectedDate;
              ui.selectedDate = new Date(d.getFullYear(), d.getMonth() - 1, 1);
              render();
            };
            break;
          case 'mini-next':
            el.onclick = () => {
              const d = ui.selectedDate;
              ui.selectedDate = new Date(d.getFullYear(), d.getMonth() + 1, 1);
              render();
            };
            break;
          case 'cal-prev':
            el.onclick = () => {
              const d = ui.viewDate;
              ui.viewDate = new Date(d.getFullYear(), d.getMonth() - 1, 1);
              render();
            };
            break;
          case 'cal-next':
            el.onclick = () => {
              const d = ui.viewDate;
              ui.viewDate = new Date(d.getFullYear(), d.getMonth() + 1, 1);
              render();
            };
            break;
          case 'more':
            el.onclick = (e) => {
              e.stopPropagation();
              ui.activeMoreDate = new Date(el.dataset.date);
              render();
            };
            break;
          case 'more-close':
            el.onclick = () => {
              ui.activeMoreDate = null;
              render();
            };
            break;
          case 'more-bg':
            el.onclick = (e) => {
              if (e.target === el) {
                ui.activeMoreDate = null;
                render();
              }
            };
            break;
          case 'edit-from-more':
            el.onclick = () => {
              ui.editingId = el.dataset.id;
              ui.activeMoreDate = null;
              render();
            };
            break;
          case 'config-new':
            el.oninput = () => {
              ui.newConfigValues[el.dataset.key] = el.value;
              const addBtn = document.querySelector('[data-act="config-add"][data-key="' + el.dataset.key + '"]');
              if (addBtn) addBtn.disabled = !el.value.trim();
            };
            el.onkeydown = (e) => {
              if (e.key === 'Enter') {
                e.preventDefault();
                addConfig(el.dataset.key, el.value);
                ui.newConfigValues[el.dataset.key] = '';
                render();
              }
            };
            break;
          case 'config-add':
            el.onclick = () => {
              const key = el.dataset.key;
              addConfig(key, ui.newConfigValues[key]);
              ui.newConfigValues[key] = '';
              render();
            };
            break;
          case 'config-start-edit':
            el.onclick = () => {
              const key = el.dataset.key, idx = +el.dataset.idx;
              ui.editingConfig = { key: key, idx: idx, value: state.config[key][idx] };
              render();
            };
            break;
          case 'config-edit-input':
            el.oninput = () => {
              if (ui.editingConfig) ui.editingConfig.value = el.value;
            };
            el.onkeydown = (e) => {
              if (e.key === 'Enter') {
                e.preventDefault();
                commitConfigEdit();
              }
              if (e.key === 'Escape') {
                ui.editingConfig = null;
                render();
              }
            };
            break;
          case 'config-save':
            el.onclick = commitConfigEdit;
            break;
          case 'config-cancel':
            el.onclick = () => {
              ui.editingConfig = null;
              render();
            };
            break;
          case 'config-delete':
            el.onclick = () => {
              if (confirm('Delete this entry?')) {
                deleteConfig(el.dataset.key, +el.dataset.idx);
              }
            };
            break;
          case 'print':
            el.onclick = () => window.print();
            break;
        }
      });
    }

    function commitConfigEdit() {
      if (!ui.editingConfig) return;
      updateConfig(ui.editingConfig.key, ui.editingConfig.idx, ui.editingConfig.value);
      ui.editingConfig = null;
      render();
    }

    function updateDashCards() {
      if (state.ui.activeTab !== 'dashboard') return;
      const container = document.querySelector('.scroll-area');
      if (!container) return;
      const filtered = state.assignments
        .filter(a => {
          const matchesSearch = (a.task || '').toLowerCase().includes(ui.search.toLowerCase());
          const matchesCourse = ui.filterCourse === 'All' || a.course === ui.filterCourse;
          const matchesStatus = ui.filterStatus === 'All' || a.status === ui.filterStatus;
          const done = (a.status || '').toLowerCase() === 'complete';
          return matchesSearch && matchesCourse && matchesStatus && (!state.ui.hideCompleted || !done);
        })
        .sort((a, b) => ((parseDate(a.date) && parseDate(a.date).getTime()) || Infinity) -
          ((parseDate(b.date) && parseDate(b.date).getTime()) || Infinity));
      container.innerHTML = filtered.length
        ? '<div class="cards-grid">' + filtered.map(renderCard).join('') + '</div>'
        : '<div class="empty-state">No assignments match your filters</div>';
      bindEvents();
    }
  </script>
</body>

</html>
